version: "3.9"

services:

  backend:

    build: .

    container_name: laptop_backend

    ports:

      - "8000:8000"

    depends_on:

      - postgres

    environment:

      DATABASE_URL: postgresql://postgres:Firena123@postgres:5432/LaptopMarketIntelligence

  postgres:

    image: postgres:16

    container_name: laptop_postgres

    restart: always

    environment:

      POSTGRES_DB: LaptopMarketIntelligenceq

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: Firena123

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: